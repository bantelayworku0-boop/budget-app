<!DOCTYPE html><html lang="am"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ወጭና ገቢ ተከታዳይ</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet"/><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0f1117;color:#e8e6e3;font-family:'Noto Sans Ethiopic',sans-serif;max-width:480px;margin:0 auto;min-height:100vh}.hdr{background:#13161f;border-bottom:1px solid #1e2235;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}.logo{width:36px;height:36px;border-radius:10px;background:#f5c842;display:flex;align-items:center;justify-content:center;font-size:18px}.ttl{font-size:15px;font-weight:700;color:#f5c842}.sub{font-size:10px;color:#5a5f72}.abtn{background:#f5c842;color:#0f1117;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-family:inherit;font-size:13px;cursor:pointer}.mrow{display:flex;align-items:center;justify-content:center;padding:12px;gap:8px}.mbtn{background:none;border:none;color:#f5c842;font-size:24px;cursor:pointer;padding:4px 12px;border-radius:8px}.mlbl{font-size:15px;font-weight:600;min-width:150px;text-align:center}.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px 14px}.scrd{background:#161923;border:1px solid #252a3a;border-radius:14px;padding:12px 8px;text-align:center}.sico{font-size:18px;margin-bottom:3px}.slbl{font-size:10px;color:#7a7f96;margin-bottom:4px}.sval{font-size:12px;font-weight:700;word-break:break-word}.trow{display:flex;gap:6px;padding:0 12px 12px}.tbtn{background:none;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;color:#7a7f96}.tbtn.act{background:#1e2235;color:#f5c842;font-weight:700}.crd{background:#161923;border:1px solid #252a3a;border-radius:16px;padding:16px;margin:0 12px 14px}.ctit{font-size:12px;color:#7a7f96;margin-bottom:12px}.emp{color:#5a5f72;font-size:13px;text-align:center;padding:20px 0}.pbg{height:7px;background:#252a3a;border-radius:4px;overflow:hidden;margin-bottom:2px}.pfl{height:100%;border-radius:4px}.crow{margin-bottom:12px}.clr{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}.ca{color:#f87171}.bc{display:flex;gap:20px;height:130px;align-items:flex-end;justify-content:center;padding:0 20px}.bco{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}.btr{width:100%;height:90px;display:flex;align-items:flex-end}.bfl{width:100%;border-radius:6px 6px 0 0;min-height:4px}.bam{font-size:11px}.blb{font-size:12px}.txr{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #1e2235}.txr:last-child{border-bottom:none}.txi{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.txin{flex:1;min-width:0}.txn{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.txm{font-size:11px;color:#5a5f72;margin-top:2px}.txrt{display:flex;flex-direction:column;align-items:flex-end;gap:4px}.txa{font-size:13px;font-weight:700}.dbt{background:none;border:1px solid #ff4d4d33;color:#f87171;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit}.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100}.ov.hid{display:none}.sh{background:#161923;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;border:1px solid #252a3a;border-bottom:none;max-height:90vh;overflow-y:auto}.hdl{width:38px;height:4px;background:#252a3a;border-radius:2px;margin:0 auto 18px}.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.mtt{font-size:16px;font-weight:700}.xbt{background:#252a3a;border:none;color:#e8e6e3;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:20px;font-family:inherit}.ttg{display:flex;background:#0f1117;border-radius:10px;padding:4px;margin-bottom:16px}.typ{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:#5a5f72;background:transparent}.typ.ae{background:#3a1a1a;color:#f87171}.typ.ai{background:#1a3a2a;color:#4ade80}.cps{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}.cp{padding:8px 14px;border-radius:20px;background:#0f1117;border:1px solid #2a2f42;cursor:pointer;font-family:inherit;font-size:13px;color:#7a7f96;white-space:nowrap;flex-shrink:0}.cp.ac{background:#1e2235;border-color:#f5c842;color:#f5c842;font-weight:600}.ilb{font-size:12px;color:#7a7f96;margin-bottom:6px;display:block}input{width:100%;background:#0f1117;border:1px solid #2a2f42;border-radius:10px;padding:11px 13px;color:#e8e6e3;font-family:inherit;font-size:14px;outline:none;margin-bottom:14px}input:focus{border-color:#f5c842}.svb{width:100%;background:#f5c842;color:#0f1117;border:none;border-radius:12px;padding:14px;font-weight:700;font-family:inherit;font-size:15px;cursor:pointer}</style></head><body><div class="hdr"><div style="display:flex;align-items:center;gap:10px"><div class="logo">💰</div><div><div class="ttl">ወጭና ገቢ ተከታዳይ</div><div class="sub">የወርሀዊ ገንዘብ አስተዳደር</div></div></div><button class="abtn" id="opnBtn">+ አስገባ</button></div><div class="mrow"><button class="mbtn" id="prevM">‹</button><span class="mlbl" id="mlbl"></span><button class="mbtn" id="nextM">›</button></div><div class="srow"><div class="scrd"><div class="sico">↑</div><div class="slbl">ጠቅላላ ገቢ</div><div class="sval" style="color:#4ade80" id="tinc">0 ብር</div></div><div class="scrd"><div class="sico">↓</div><div class="slbl">ጠቅላላ ወጭ</div><div class="sval" style="color:#f87171" id="texp">0 ብር</div></div><div class="scrd"><div class="sico">=</div><div class="slbl">ቀሪ ሂሳብ</div><div class="sval" id="tbal">0 ብር</div></div></div><div class="trow"><button class="tbtn act" id="t1">📊 አጠቃላይ</button><button class="tbtn" id="t2">📋 ዝርዝር</button></div><div id="v1"><div class="crd" id="svc" style="display:none"><div class="ctit">የቁጠባ ደረጃ</div><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px"><span id="sva"></span><span id="svp" style="font-weight:700"></span></div><div class="pbg"><div class="pfl" id="svb" style="background:#4ade80"></div></div></div><div class="crd"><div class="ctit">ወጭ በምድብ</div><div id="cbr"><div class="emp">የወጭ መዝገቦች አልተገኙም</div></div></div><div class="crd" id="bcc" style="display:none"><div class="ctit">ገቢ vs ወጭ</div><div class="bc"><div class="bco"><span class="bam" style="color:#4ade80" id="bia"></span><div class="btr"><div class="bfl" id="bib" style="background:#4ade80"></div></div><span class="blb" style="color:#4ade80">ገቢ</span></div><div class="bco"><span class="bam" style="color:#f87171" id="bea"></span><div class="btr"><div class="bfl" id="beb" style="background:#f87171"></div></div><span class="blb" style="color:#f87171">ወጭ</span></div></div></div></div><div id="v2" style="display:none"><div class="crd"><div id="txl"><div class="emp">በዚህ ወር ምንም መዝገብ የለም</div></div></div></div><div class="ov hid" id="modal"><div class="sh"><div class="hdl"></div><div class="mhd"><span class="mtt">አዲስ መዝገብ</span><button class="xbt" id="clsBtn">×</button></div><div class="ttg"><button class="typ ae" id="bex">↓ ወጭ</button><button class="typ" id="bin">↑ ገቢ</button></div><label class="ilb">ምድብ</label><div class="cps" id="cpc"></div><label class="ilb">መጠን (ብር)</label><input type="number" id="fam" placeholder="ለምሳሌ፡ 1500"/><label class="ilb">ማስታወሻ</label><input type="text" id="fno" placeholder="ምን ዓይነት?"/><label class="ilb">ቀን</label><input type="date" id="fdt"/><button class="svb" id="svBtn">አስቀምጥ</button></div></div><script>const IC=['ደሞዝ','ንግድ','ኪራይ ገቢ','ስጦታ','ሌላ'],EC=['ምግብ','መጓጓዣ','ቤት ኪራይ','ጤና','ትምህርት','ልብስ','መዝናኛ','ሌላ'],MN=['ጃንዋሪ','ፌብሩዋሪ','ማርች','ኤፕሪል','ሜይ','ጁን','ጁላይ','ኦገስት','ሴፕቴምበር','ኦክቶበር','ኖቬምበር','ዲሴምበር'];let tx=JSON.parse(localStorage.getItem('wtx')||'[]'),cm=new Date().getMonth(),cy=new Date().getFullYear(),ft='expense',fc=EC[0];const fmt=n=>Number(n).toLocaleString()+' ብር',sv=()=>localStorage.setItem('wtx',JSON.stringify(tx)),fi=()=>tx.filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy});function render(){document.getElementById('mlbl').textContent=MN[cm]+' '+cy;const f=fi(),inc=f.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),exp=f.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),bal=inc-exp;document.getElementById('tinc').textContent=fmt(inc);document.getElementById('texp').textContent=fmt(exp);const be=document.getElementById('tbal');be.textContent=fmt(bal);be.style.color=bal>=0?'#60a5fa':'#f87171';const sc=document.getElementById('svc');if(inc>0){sc.style.display='';const p=(bal/inc)*100;document.getElementById('sva').textContent='ቁጠባ: '+fmt(bal);const pe=document.getElementById('svp');pe.textContent=p.toFixed(1)+'%';pe.style.color=bal>=0?'#4ade80':'#f87171';const sb=document.getElementById('svb');sb.style.width=Math.max(0,Math.min(100,p))+'%';sb.style.background=bal>=0?'#4ade80':'#f87171'}else sc.style.display='none';const em={};f.filter(t=>t.type==='expense').forEach(t=>em[t.category]=(em[t.category]||0)+t.amount);const ea=Object.entries(em).sort((a,b)=>b[1]-a[1]),mx=ea[0]?.[1]||1,ce=document.getElementById('cbr');ce.innerHTML=ea.length===0?'<div class="emp">የወጭ መዝገቦች አልተገኙም</div>':ea.map(([c,a])=>'<div class="crow"><div class="clr"><span>'+c+'</span><span class="ca">'+fmt(a)+'</span></div><div class="pbg"><div class="pfl" style="width:'+(a/mx*100)+'%;background:linear-gradient(90deg,#f87171,#f5c842)"></div></div></div>').join('');const bc=document.getElementById('bcc');if(inc>0||exp>0){bc.style.display='';const m=Math.max(inc,exp)||1;document.getElementById('bia').textContent=fmt(inc);document.getElementById('bea').textContent=fmt(exp);document.getElementById('bib').style.height=(inc/m*90)+'%';document.getElementById('beb').style.height=(exp/m*90)+'%'}else bc.style.display='none';const tl=document.getElementById('txl'),sr=[...f].reverse();tl.innerHTML=sr.length===0?'<div class="emp">በዚህ ወር ምንም መዝገብ የለም</div>':sr.map(t=>'<div class="txr"><div class="txi" style="background:'+(t.type==='income'?'#1a3a2a':'#3a1a1a')+'">'+(t.type==='income'?'↑':'↓')+'</div><div class="txin"><div class="txn">'+(t.note||t.category)+'</div><div class="txm">'+t.category+' · '+t.date+'</div></div><div class="txrt"><span class="txa" style="color:'+(t.type==='income'?'#4ade80':'#f87171')+'">'+(t.type==='income'?'+':'-')+fmt(t.amount)+'</span><button class="dbt" onclick="del(\''+t.id+'\')">✕</button></div></div>').join('')}function rcp(){const cats=ft==='income'?IC:EC;document.getElementById('cpc').innerHTML=cats.map(c=>'<button class="cp'+(c===fc?' ac':'')+'" onclick="scat(\''+c+'\')">'+c+'</button>').join('')}function scat(c){fc=c;rcp()}function stype(t){ft=t;fc=t==='income'?IC[0]:EC[0];document.getElementById('bex').className='typ'+(t==='expense'?' ae':'');document.getElementById('bin').className='typ'+(t==='income'?' ai':'');rcp()}document.getElementById('opnBtn').onclick=function(){document.getElementById('fdt').value=new Date().toISOString().split('T')[0];document.getElementById('fam').value='';document.getElementById('fno').value='';stype('expense');document.getElementById('modal').classList.remove('hid')};document.getElementById('clsBtn').onclick=function(){document.getElementById('modal').classList.add('hid')};document.getElementById('modal').onclick=function(e){if(e.target===this)this.classList.add('hid')};document.getElementById('bex').onclick=function(){stype('expense')};document.getElementById('bin').onclick=function(){stype('income')};document.getElementById('svBtn').onclick=function(){const a=parseFloat(document.getElementById('fam').value);if(!a||a<=0){alert('ትክክለኛ መጠን ያስፈልጋል');return}tx.push({id:Date.now().toString(),type:ft,category:fc,amount:a,note:document.getElementById('fno').value,date:document.getElementById('fdt').value});sv();document.getElementById('modal').classList.add('hid');render()};document.getElementById('prevM').onclick=function(){cm--;if(cm<0){cm=11;cy--}render()};document.getElementById('nextM').onclick=function(){cm++;if(cm>11){cm=0;cy++}render()};document.getElementById('t1').onclick=function(){document.getElementById('v1').style.display='';document.getElementById('v2').style.display='none';this.className='tbtn act';document.getElementById('t2').className='tbtn'};document.getElementById('t2').onclick=function(){document.getElementById('v1').style.display='none';document.getElementById('v2').style.display='';this.className='tbtn act';document.getElementById('t1').className='tbtn'};window.del=function(id){if(confirm('ይህን መዝገብ መሰረዝ ይፈልጋሉ?')){tx=tx.filter(t=>t.id!==id);sv();render()}};if('serviceWorker' in navigator){navigator.serviceWorker.register('/budget-app/sw.js').catch(()=>{})}render();rcp();</script></body></html>
