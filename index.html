<!DOCTYPE html><html lang="am"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/><meta name="theme-color" content="#0f1117"/><title>ወጭና ገቢ ተከታዳይ</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet"/><style>*{box-sizing:border-box;margin:0;padding:0}.header{background:#13161f;border-bottom:1px solid #1e2235;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;font-family:'Noto Sans Ethiopic',sans-serif}.logo{width:36px;height:36px;border-radius:10px;background:#f5c842;display:flex;align-items:center;justify-content:center;font-size:18px}.app-title{font-size:15px;font-weight:700;color:#f5c842}.app-sub{font-size:10px;color:#5a5f72}.add-btn{background:#f5c842;color:#0f1117;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer}body{background:#0f1117;color:#e8e6e3;font-family:'Noto Sans Ethiopic',sans-serif;max-width:480px;margin:0 auto}.month-row{display:flex;align-items:center;justify-content:center;padding:12px;gap:8px}.month-btn{background:none;border:none;color:#f5c842;font-size:24px;cursor:pointer;padding:4px 12px}.month-label{font-size:15px;font-weight:600;min-width:150px;text-align:center}.summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 12px 14px}.summary-card{background:#161923;border:1px solid #252a3a;border-radius:14px;padding:12px 8px;text-align:center}.summary-icon{font-size:18px;margin-bottom:3px}.summary-label{font-size:10px;color:#7a7f96;margin-bottom:4px}.summary-value{font-size:12px;font-weight:700;word-break:break-word}.tab-row{display:flex;gap:6px;padding:0 12px 12px}.tab-btn{background:none;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;color:#7a7f96}.tab-btn.active{background:#1e2235;color:#f5c842;font-weight:700}.card{background:#161923;border:1px solid #252a3a;border-radius:16px;padding:16px;margin:0 12px 14px}.card-title{font-size:12px;color:#7a7f96;margin-bottom:12px}.empty{color:#5a5f72;font-size:13px;text-align:center;padding:20px 0}.progress-bg{height:7px;background:#252a3a;border-radius:4px;overflow:hidden;margin-bottom:2px}.progress-fill{height:100%;border-radius:4px}.cat-row{margin-bottom:12px}.cat-label-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px}.cat-amt{color:#f87171}.bar-chart{display:flex;gap:20px;height:130px;align-items:flex-end;justify-content:center;padding:0 20px}.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}.bar-track{width:100%;height:90px;display:flex;align-items:flex-end}.bar-fill{width:100%;border-radius:6px 6px 0 0;min-height:4px}.bar-amt{font-size:11px}.bar-label{font-size:12px}.tx-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #1e2235}.tx-row:last-child{border-bottom:none}.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.tx-info{flex:1;min-width:0}.tx-note{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tx-meta{font-size:11px;color:#5a5f72;margin-top:2px}.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}.tx-amt{font-size:13px;font-weight:700}.del-btn{background:none;border:1px solid #ff4d4d33;color:#f87171;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100}.modal-overlay.hidden{display:none}.modal-sheet{background:#161923;border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;border:1px solid #252a3a;border-bottom:none;max-height:92vh;overflow-y:auto}.modal-handle{width:38px;height:4px;background:#252a3a;border-radius:2px;margin:0 auto 18px}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.modal-title{font-size:16px;font-weight:700}.close-btn{background:#252a3a;border:none;color:#e8e6e3;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:17px}.type-toggle{display:flex;background:#0f1117;border-radius:10px;padding:4px;margin-bottom:16px}.type-btn{flex:1;padding:9px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:#5a5f72;background:transparent}.type-btn.active-income{background:#1a3a2a;color:#4ade80}.type-btn.active-expense{background:#3a1a1a;color:#f87171}.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}.chip{padding:8px 14px;border-radius:20px;background:#0f1117;border:1px solid #2a2f42;cursor:pointer;font-family:inherit;font-size:13px;color:#7a7f96;white-space:nowrap;flex-shrink:0}.chip.active{background:#1e2235;border-color:#f5c842;color:#f5c842;font-weight:600}.input-label{font-size:12px;color:#7a7f96;margin-bottom:6px;display:block}input[type=text],input[type=number],input[type=date]{width:100%;background:#0f1117;border:1px solid #2a2f42;border-radius:10px;padding:11px 13px;color:#e8e6e3;font-family:inherit;font-size:14px;outline:none;margin-bottom:14px}.save-btn{width:100%;background:#f5c842;color:#0f1117;border:none;border-radius:12px;padding:14px;font-weight:700;font-family:inherit;font-size:15px;cursor:pointer}</style></head><body><div class="header"><div style="display:flex;align-items:center;gap:10px"><div class="logo">💰</div><div><div class="app-title">ወጭና ገቢ ተከታዳይ</div><div class="app-sub">የወርሀዊ ገንዘብ አስተዳደር</div></div></div><button class="add-btn" onclick="openModal()">+ አስገባ</button></div><div class="month-row"><button class="month-btn" onclick="changeMonth(-1)">‹</button><span class="month-label" id="monthLabel"></span><button class="month-btn" onclick="changeMonth(1)">›</button></div><div class="summary-row"><div class="summary-card"><div class="summary-icon">↑</div><div class="summary-label">ጠቅላላ ገቢ</div><div class="summary-value" style="color:#4ade80" id="totalIncome">0 ብር</div></div><div class="summary-card"><div class="summary-icon">↓</div><div class="summary-label">ጠቅላላ ወጭ</div><div class="summary-value" style="color:#f87171" id="totalExpense">0 ብር</div></div><div class="summary-card"><div class="summary-icon">=</div><div class="summary-label">ቀሪ ሂሳብ</div><div class="summary-value" id="balance">0 ብር</div></div></div><div class="tab-row"><button class="tab-btn active" id="tab-overview" onclick="switchTab('overview')">📊 አጠቃላይ</button><button class="tab-btn" id="tab-transactions" onclick="switchTab('transactions')">📋 ዝርዝር</button></div><div id="view-overview"><div class="card" id="savingsCard" style="display:none"><div class="card-title">የቁጠባ ደረጃ</div><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px"><span id="savingsAmt"></span><span id="savingsPct" style="font-weight:700"></span></div><div class="progress-bg"><div class="progress-fill" id="savingsBar" style="background:#4ade80"></div></div></div><div class="card"><div class="card-title">ወጭ በምድብ</div><div id="catBars"><div class="empty">የወጭ መዝገቦች አልተገኙም</div></div></div><div class="card" id="barChartCard" style="display:none"><div class="card-title">ገቢ vs ወጭ</div><div class="bar-chart"><div class="bar-col"><span class="bar-amt" style="color:#4ade80" id="barIncomeAmt"></span><div class="bar-track"><div class="bar-fill" id="barIncome" style="background:#4ade80"></div></div><span class="bar-label" style="color:#4ade80">ገቢ</span></div><div class="bar-col"><span class="bar-amt" style="color:#f87171" id="barExpenseAmt"></span><div class="bar-track"><div class="bar-fill" id="barExpense" style="background:#f87171"></div></div><span class="bar-label" style="color:#f87171">ወጭ</span></div></div></div></div><div id="view-transactions" style="display:none"><div class="card"><div id="txList"><div class="empty">በዚህ ወር ምንም መዝገብ የለም</div></div></div></div><div class="modal-overlay hidden" id="modal" onclick="bgClose(event)"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-header"><span class="modal-title">አዲስ መዝገብ</span><button class="close-btn" onclick="closeModal()">×</button></div><div class="type-toggle"><button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">↓ ወጭ</button><button class="type-btn" id="btnIncome" onclick="setType('income')">↑ ገቢ</button></div><label class="input-label">ምድብ</label><div class="chips" id="catChips"></div><label class="input-label">መጠን (ብር)</label><input type="number" id="fAmount" placeholder="ለምሳሌ፡ 1500"/><label class="input-label">ማስታወሻ (አማራጭ)</label><input type="text" id="fNote" placeholder="ምን ዓይነት ወጭ/ገቢ?"/><label class="input-label">ቀን</label><input type="date" id="fDate"/><button class="save-btn" onclick="saveTransaction()">አስቀምጥ</button></div></div><script>const IC=['ደሞዝ','ንግድ','ኪራይ ገቢ','ስጦታ','ሌላ'],EC=['ምግብ','መጓጓዣ','ቤት ኪራይ','ጤና','ትምህርት','ልብስ','መዝናኛ','ሌላ'],MN=['ጃንዋሪ','ፌብሩዋሪ','ማርች','ኤፕሪል','ሜይ','ጁን','ጁላይ','ኦገስት','ሴፕቴምበር','ኦክቶበር','ኖቬምበር','ዲሴምበር'];let tx=JSON.parse(localStorage.getItem('tx')||'[]'),cm=new Date().getMonth(),cy=new Date().getFullYear(),ft='expense',fc='ምግብ';const fmt=n=>Number(n).toLocaleString('en-ET')+' ብር',sv=()=>localStorage.setItem('tx',JSON.stringify(tx)),fi=()=>tx.filter(t=>{const d=new Date(t.date);return d.getMonth()===cm&&d.getFullYear()===cy});function render(){document.getElementById('monthLabel').textContent=MN[cm]+' '+cy;const f=fi(),inc=f.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),exp=f.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0),bal=inc-exp;document.getElementById('totalIncome').textContent=fmt(inc);document.getElementById('totalExpense').textContent=fmt(exp);const be=document.getElementById('balance');be.textContent=fmt(bal);be.style.color=bal>=0?'#60a5fa':'#f87171';const sc=document.getElementById('savingsCard');if(inc>0){sc.style.display='';const p=(bal/inc)*100;document.getElementById('savingsAmt').textContent='ቁጠባ: '+fmt(bal);const pe=document.getElementById('savingsPct');pe.textContent=p.toFixed(1)+'%';pe.style.color=bal>=0?'#4ade80':'#f87171';const sb=document.getElementById('savingsBar');sb.style.width=Math.max(0,Math.min(100,p))+'%';sb.style.background=bal>=0?'#4ade80':'#f87171'}else sc.style.display='none';const em={};f.filter(t=>t.type==='expense').forEach(t=>em[t.category]=(em[t.category]||0)+t.amount);const ea=Object.entries(em).sort((a,b)=>b[1]-a[1]),mx=ea[0]?.[1]||1,ce=document.getElementById('catBars');ce.innerHTML=ea.length===0?'<div class="empty">የወጭ መዝገቦች አልተገኙም</div>':ea.map(([c,a])=>{c}{fmt(a)}).join('');const bc=document.getElementById('barChartCard');if(inc>0||exp>0){bc.style.display='';const m=Math.max(inc,exp)||1;document.getElementById('barIncomeAmt').textContent=fmt(inc);document.getElementById('barExpenseAmt').textContent=fmt(exp);document.getElementById('barIncome').style.height=((inc/m)*90)+'%';document.getElementById('barExpense').style.height=((exp/m)*90)+'%'}else bc.style.display='none';const tl=document.getElementById('txList'),sr=[...f].reverse();tl.innerHTML=sr.length===0?'<div class="empty">በዚህ ወር ምንም መዝገብ የለም</div>':sr.map(t=>{t.type==='income'?'↑':'↓'}{t.note||t.category}{t.category} · {t.type==='income'?'+':'-'}{fmt(t.amount)}✕).join('')}function changeMonth(d){cm+=d;if(cm<0){cm=11;cy--}if(cm>11){cm=0;cy++}render()}function switchTab(t){document.getElementById('view-overview').style.display=t==='overview'?'':'none';document.getElementById('view-transactions').style.display=t==='transactions'?'':'none';document.getElementById('tab-overview').className='tab-btn'+(t==='overview'?' active':'');document.getElementById('tab-transactions').className='tab-btn'+(t==='transactions'?' active':'')}function openModal(){document.getElementById('fDate').value=new Date().toISOString().split('T')[0];document.getElementById('fAmount').value='';document.getElementById('fNote').value='';setType('expense');document.getElementById('modal').classList.remove('hidden')}function closeModal(){document.getElementById('modal').classList.add('hidden')}function bgClose(e){if(e.target.id==='modal')closeModal()}function setType(t){ft=t;fc=t==='income'?IC[0]:EC[0];document.getElementById('btnExpense').className='type-btn'+(t==='expense'?' active-expense':'');document.getElementById('btnIncome').className='type-btn'+(t==='income'?' active-income':'');rc()}function rc(){const cats=ft==='income'?IC:EC;document.getElementById('catChips').innerHTML=cats.map(c=>${c}).join('')}function sc2(c){fc=c;rc()}function saveTransaction(){const a=parseFloat(document.getElementById('fAmount').value);if(!a||a<=0){alert('ትክክለኛ መጠን ያስፈልጋል');return}const n=document.getElementById('fNote').value,d=document.getElementById('fDate').value||new Date().toISOString().split('T')[0];tx.push({id:Date.now().toString(),type:ft,category:fc,amount:a,note:n,date:d});sv();closeModal();render()}function del(id){if(confirm('ይህን መዝገብ መሰረዝ ይፈልጋሉ?')){tx=tx.filter(t=>t.
